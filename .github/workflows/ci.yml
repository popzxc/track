name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-fmt:
    name: Rust formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  rust-unit-test:
    name: Rust unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude track-integration-tests

  rust-integration-test:
    name: Rust integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p track-integration-tests
        env:
          RUN_TRACK_INTEGRATION_TESTS: "true"
          # The tests set process-global env vars (TRACK_STATE_DIR, etc.) that
          # would race if tests ran in parallel, so enforce sequential execution.
          RUST_TEST_THREADS: "1"

  frontend-unit-test:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install
      - run: bun run typecheck
      - run: bun run test

  frontend-e2e:
    name: Frontend e2e tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"
      - run: bun install
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e
