name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  TRACK_DOCKER_PLATFORMS: linux/amd64,linux/arm64

permissions:
  contents: read

jobs:
  validate_ref:
    name: Validate release ref
    runs-on: ubuntu-latest
    steps:
      - name: Refuse manual release runs outside main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "workflow_dispatch release runs must target refs/heads/main." >&2
          exit 1

  verify_docker_build:
    name: Verify Docker image build
    needs: validate_ref
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Derive git commit metadata
        id: git_commit
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Buildx cannot `load` a multi-platform image into the runner's local
      # Docker daemon, so validation stops after the cross-platform build
      # completes successfully.
      - name: Build the runtime image matrix before publishing
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: ${{ env.TRACK_DOCKER_PLATFORMS }}
          build-args: |
            TRACK_GIT_COMMIT=${{ steps.git_commit.outputs.short_sha }}

  release_please:
    name: Open release PR or publish release
    needs:
      - validate_ref
      - verify_docker_build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: release-please
      cancel-in-progress: true
    outputs:
      release_created: ${{ steps.release_please.outputs.release_created }}
      release_tag: ${{ steps.release_please.outputs.tag_name }}
      release_version: ${{ steps.release_please.outputs.version }}
    steps:
      - name: Open or update the release PR, or publish the release
        id: release_please
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please/config.json
          manifest-file: .github/release-please/manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  publish_product_artifacts:
    name: Publish Docker image and release assets
    needs:
      - release_please
    if: needs.release_please.outputs.release_created == 'true'
    uses: ./.github/workflows/post-release.yml
    permissions:
      contents: write
      packages: write
    with:
      release_tag: ${{ needs.release_please.outputs.release_tag }}
      release_version: ${{ needs.release_please.outputs.release_version }}
      publish_latest: true
    secrets: inherit
