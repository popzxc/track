name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate_ref:
    name: Validate release ref
    runs-on: ubuntu-latest
    steps:
      - name: Refuse manual release runs outside main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "workflow_dispatch release runs must target refs/heads/main." >&2
          exit 1

  release_pr:
    name: Open release PR
    needs: validate_ref
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-pr
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Open or update the release PR
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify_docker_build:
    name: Verify Docker image build
    needs: validate_ref
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the runtime image before publishing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false

  build_cli_binaries:
    name: Build CLI binary (${{ matrix.target }})
    needs: validate_ref
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-15
            target: aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build the non-CUDA CLI
        run: cargo build --release -p track-cli --locked --target ${{ matrix.target }}

      - name: Stage the built binary for artifact upload
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          artifact_dir="dist/${TARGET}"
          mkdir -p "$artifact_dir"
          cp "target/${TARGET}/release/track" "${artifact_dir}/track"
          chmod +x "${artifact_dir}/track"

      - name: Upload the built binary
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: cli-binary-${{ matrix.target }}
          path: dist/${{ matrix.target }}/track
          retention-days: 7

    # TODO: Add a Linux CUDA artifact once the repository has a GPU-capable
    # runner with the CUDA toolkit available during release builds.

  release:
    name: Publish workspace
    needs:
      - release_pr
      - verify_docker_build
      - build_cli_binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      cli_release_created: ${{ steps.cli_release.outputs.created }}
      cli_tag: ${{ steps.cli_release.outputs.tag }}
      cli_version: ${{ steps.cli_release.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates and create releases
        id: release_plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract the product release metadata
        id: cli_release
        env:
          RELEASES: ${{ steps.release_plz.outputs.releases }}
        run: |
          set -euo pipefail

          releases_json="${RELEASES:-[]}"
          if [[ -z "$releases_json" ]]; then
            releases_json='[]'
          fi

          cli_release="$(jq -c '[.[] | select(.package_name == "track-cli")] | first' <<<"$releases_json")"
          if [[ -z "$cli_release" || "$cli_release" == "null" ]]; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(jq -r '.version' <<<"$cli_release")"

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  publish_product_artifacts:
    name: Publish Docker image and release assets
    needs:
      - release
      - build_cli_binaries
    if: needs.release.outputs.cli_release_created == 'true'
    uses: ./.github/workflows/post-release.yml
    permissions:
      contents: write
      packages: write
    with:
      release_tag: ${{ needs.release.outputs.cli_tag }}
      release_version: ${{ needs.release.outputs.cli_version }}
      publish_latest: true
      use_prebuilt_binaries: true
    secrets: inherit
