name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate_ref:
    name: Validate release ref
    runs-on: ubuntu-latest
    steps:
      - name: Refuse manual release runs outside main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "workflow_dispatch release runs must target refs/heads/main." >&2
          exit 1

  verify_docker_build:
    name: Verify Docker image build
    needs: validate_ref
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the runtime image before publishing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false

  build_cli_binaries:
    name: Build CLI binary (${{ matrix.target }})
    needs: validate_ref
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-15
            target: aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build the non-CUDA CLI
        run: cargo build --release -p track-cli --locked --target ${{ matrix.target }}

      - name: Stage the built binary for artifact upload
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          artifact_dir="dist/${TARGET}"
          mkdir -p "$artifact_dir"
          cp "target/${TARGET}/release/track" "${artifact_dir}/track"
          chmod +x "${artifact_dir}/track"

      - name: Upload the built binary
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: cli-binary-${{ matrix.target }}
          path: dist/${{ matrix.target }}/track
          retention-days: 7

    # TODO: Add a Linux CUDA artifact once the repository has a GPU-capable
    # runner with the CUDA toolkit available during release builds.

  release_please:
    name: Open release PR or publish release
    needs:
      - validate_ref
      - verify_docker_build
      - build_cli_binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: release-please
      cancel-in-progress: true
    outputs:
      release_created: ${{ steps.release_please.outputs.release_created }}
      release_tag: ${{ steps.release_please.outputs.tag_name }}
      release_version: ${{ steps.release_please.outputs.version }}
    steps:
      - name: Open or update the release PR, or publish the release
        id: release_please
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please/config.json
          manifest-file: .github/release-please/manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  publish_product_artifacts:
    name: Publish Docker image and release assets
    needs:
      - release_please
      - build_cli_binaries
    if: needs.release_please.outputs.release_created == 'true'
    uses: ./.github/workflows/post-release.yml
    permissions:
      contents: write
      packages: write
    with:
      release_tag: ${{ needs.release_please.outputs.release_tag }}
      release_version: ${{ needs.release_please.outputs.release_version }}
      publish_latest: true
      use_prebuilt_binaries: true
    secrets: inherit
