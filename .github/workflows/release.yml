name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate_ref:
    name: Validate release ref
    runs-on: ubuntu-latest
    steps:
      - name: Refuse manual release runs outside main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "workflow_dispatch release runs must target refs/heads/main." >&2
          exit 1

  release_please:
    name: Open release PR or publish release
    needs:
      - validate_ref
    runs-on: ubuntu-latest
    # CI already validates that the repository still builds. The release flow
    # therefore avoids a second pre-publication Docker build and only triggers
    # the slower multi-architecture publish path after a release actually exists.
    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: release-please
      cancel-in-progress: true
    outputs:
      release_created: ${{ steps.release_please.outputs.release_created }}
      release_tag: ${{ steps.release_please.outputs.tag_name }}
      release_version: ${{ steps.release_please.outputs.version }}
    steps:
      - name: Open or update the release PR, or publish the release
        id: release_please
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please/config.json
          manifest-file: .github/release-please/manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  publish_product_artifacts:
    name: Publish Docker image and release assets
    needs:
      - release_please
    if: needs.release_please.outputs.release_created == 'true'
    uses: ./.github/workflows/post-release.yml
    permissions:
      contents: write
      packages: write
    with:
      release_tag: ${{ needs.release_please.outputs.release_tag }}
      release_version: ${{ needs.release_please.outputs.release_version }}
      publish_latest: true
    secrets: inherit
