name: Post Release Publication

on:
  workflow_call:
    inputs:
      release_tag:
        description: Git tag for the existing GitHub release.
        required: true
        type: string
      release_version:
        description: Shared workspace version that owns the product release assets.
        required: true
        type: string
      publish_latest:
        description: Whether to also publish the Docker image as latest.
        required: true
        type: boolean
      use_prebuilt_binaries:
        description: Reuse CLI binaries that were already built earlier in the same workflow run.
        required: true
        type: boolean

jobs:
  verify_release:
    name: Verify the GitHub release exists
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Confirm the requested GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TRACK_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release view "$TRACK_TAG" >/dev/null

      - name: Normalize the GitHub release title
        env:
          GH_TOKEN: ${{ github.token }}
          TRACK_TAG: ${{ inputs.release_tag }}
          TRACK_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          gh release edit "$TRACK_TAG" --title "track v${TRACK_VERSION}"

  publish_docker:
    name: Publish Docker image
    needs: verify_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/track
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Derive Docker image metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=v${{ inputs.release_version }}
            type=raw,value=latest,enable=${{ inputs.publish_latest }}
          labels: |
            org.opencontainers.image.description=track API and bundled WebUI

      - name: Build and push the Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

  build_cli_binaries:
    name: Build CLI binary (${{ matrix.target }})
    if: ${{ !inputs.use_prebuilt_binaries }}
    needs: verify_release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-15
            target: aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag }}

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build the non-CUDA CLI
        run: cargo build --release -p track-cli --locked --target ${{ matrix.target }}

      - name: Stage the built binary for artifact upload
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          artifact_dir="dist/${TARGET}"
          mkdir -p "$artifact_dir"
          cp "target/${TARGET}/release/track" "${artifact_dir}/track"
          chmod +x "${artifact_dir}/track"

      - name: Upload the built binary
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: cli-binary-${{ matrix.target }}
          path: dist/${{ matrix.target }}/track
          retention-days: 7

  # The recovery path rebuilds the release assets from the tagged source, so it
  # needs the same CUDA-only compile job as the main release workflow.
  build_cli_binary_cuda_linux:
    name: Build CLI binary (x86_64-unknown-linux-gnu-cuda)
    if: ${{ !inputs.use_prebuilt_binaries }}
    needs: verify_release
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.9.1-devel-ubuntu22.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Prepare the CUDA build container
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y build-essential ca-certificates clang cmake curl git libclang-dev libssl-dev pkg-config
          echo "/usr/local/nvidia/bin:/usr/local/cuda/bin" >> "$GITHUB_PATH"

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag }}

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build the CUDA CLI
        env:
          CUDACXX: /usr/local/cuda/bin/nvcc
        run: cargo build --release -p track-cli --locked --features cuda --target x86_64-unknown-linux-gnu

      - name: Stage the built binary for artifact upload
        run: |
          set -euo pipefail

          artifact_dir="dist/x86_64-unknown-linux-gnu-cuda"
          mkdir -p "$artifact_dir"
          cp "target/x86_64-unknown-linux-gnu/release/track" "${artifact_dir}/track"
          chmod +x "${artifact_dir}/track"

      - name: Upload the built binary
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: cli-binary-x86_64-unknown-linux-gnu-cuda
          path: dist/x86_64-unknown-linux-gnu-cuda/track
          retention-days: 7

  upload_prebuilt_cli_assets:
    name: Upload CLI release assets
    if: ${{ inputs.use_prebuilt_binaries }}
    needs: publish_docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag }}

      - name: Download the prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/raw
          pattern: cli-binary-*

      - name: Package release artifacts and generate checksums
        env:
          TRACK_VERSION: ${{ inputs.release_version }}
        run: bash ./trackup/package-release-assets.sh

      - name: Upload assets to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TRACK_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$TRACK_TAG" dist/*.tar.gz dist/*.txt --clobber

  upload_rebuilt_cli_assets:
    name: Upload rebuilt CLI release assets
    if: ${{ !inputs.use_prebuilt_binaries }}
    needs:
      - build_cli_binaries
      - build_cli_binary_cuda_linux
      - publish_docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag }}

      - name: Download the rebuilt binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/raw
          pattern: cli-binary-*

      - name: Package release artifacts and generate checksums
        env:
          TRACK_VERSION: ${{ inputs.release_version }}
        run: bash ./trackup/package-release-assets.sh

      - name: Upload assets to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TRACK_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$TRACK_TAG" dist/*.tar.gz dist/*.txt --clobber
