name: Post Release Publication

on:
  workflow_call:
    inputs:
      release_tag:
        description: Git tag for the existing GitHub release.
        required: true
        type: string
      release_version:
        description: Shared workspace version that owns the product release assets.
        required: true
        type: string
      publish_latest:
        description: Whether to also publish the Docker image as latest.
        required: true
        type: boolean

jobs:
  verify_release:
    name: Verify the GitHub release exists
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Confirm the requested GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TRACK_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release view "$TRACK_TAG" >/dev/null

      - name: Normalize the GitHub release title
        env:
          GH_TOKEN: ${{ github.token }}
          TRACK_TAG: ${{ inputs.release_tag }}
          TRACK_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          gh release edit "$TRACK_TAG" --title "track v${TRACK_VERSION}"

  publish_docker:
    name: Publish Docker image
    needs: verify_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/track
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag }}

      - name: Derive git commit metadata
        id: git_commit
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Derive Docker image metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=v${{ inputs.release_version }}
            type=raw,value=latest,enable=${{ inputs.publish_latest }}
          labels: |
            org.opencontainers.image.description=track API and bundled WebUI

      - name: Build and push the Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            TRACK_GIT_COMMIT=${{ steps.git_commit.outputs.short_sha }}

  upload_release_assets:
    name: Upload release assets
    needs: publish_docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag }}

      - name: Package release artifacts and generate checksums
        env:
          TRACK_VERSION: ${{ inputs.release_version }}
        run: bash ./trackup/package-release-assets.sh

      - name: Upload assets to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TRACK_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$TRACK_TAG" dist/*.tar.gz dist/*.txt --clobber
