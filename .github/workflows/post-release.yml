name: Post Release Publication

on:
  workflow_call:
    inputs:
      release_tag:
        description: Git tag for the existing GitHub release.
        required: true
        type: string
      release_version:
        description: Shared workspace version that owns the product release assets.
        required: true
        type: string
      publish_latest:
        description: Whether to also publish the Docker image as latest.
        required: true
        type: boolean

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/track

jobs:
  verify_release:
    name: Verify the GitHub release exists
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Confirm the requested GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TRACK_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release view "$TRACK_TAG" >/dev/null

      - name: Normalize the GitHub release title
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TRACK_TAG: ${{ inputs.release_tag }}
          TRACK_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          gh release edit "$TRACK_TAG" --title "track v${TRACK_VERSION}"

  publish_docker_arch:
    name: Publish Docker image (${{ matrix.platform }})
    needs: verify_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag }}

      - name: Derive git commit metadata
        id: git_commit
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.REGISTRY_IMAGE }}:v${{ inputs.release_version }}-${{ matrix.arch_suffix }}
          labels: |
            org.opencontainers.image.description=track API and bundled WebUI
            org.opencontainers.image.version=${{ inputs.release_version }}
            org.opencontainers.image.revision=${{ steps.git_commit.outputs.short_sha }}
          build-args: |
            TRACK_GIT_COMMIT=${{ steps.git_commit.outputs.short_sha }}
          cache-from: type=gha,scope=track-${{ matrix.arch_suffix }}
          cache-to: type=gha,mode=max,scope=track-${{ matrix.arch_suffix }}

  publish_docker_manifest:
    name: Publish Docker manifest
    needs: publish_docker_arch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create version manifest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${REGISTRY_IMAGE}:v${{ inputs.release_version }}" \
            "${REGISTRY_IMAGE}:v${{ inputs.release_version }}-amd64" \
            "${REGISTRY_IMAGE}:v${{ inputs.release_version }}-arm64"

      - name: Create latest manifest
        if: inputs.publish_latest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${REGISTRY_IMAGE}:latest" \
            "${REGISTRY_IMAGE}:v${{ inputs.release_version }}-amd64" \
            "${REGISTRY_IMAGE}:v${{ inputs.release_version }}-arm64"
        env:
          REGISTRY_IMAGE: ${{ env.REGISTRY_IMAGE }}

  upload_release_assets:
    name: Upload release assets
    needs: publish_docker_manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag }}

      - name: Package release artifacts and generate checksums
        env:
          TRACK_VERSION: ${{ inputs.release_version }}
        run: bash ./trackup/package-release-assets.sh

      - name: Upload assets to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TRACK_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$TRACK_TAG" dist/*.tar.gz dist/*.txt --clobber
