services:
  track-web:
    image: track-web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TRACK_GIT_COMMIT: "${TRACK_GIT_COMMIT:-unknown}"
        TRACK_UID: "${TRACK_UID:-1000}"
        TRACK_GID: "${TRACK_GID:-1000}"
    # The runtime image creates a real in-container user that matches the host
    # UID/GID. The migration release still bind-mounts legacy data read-only,
    # and the matching passwd entry keeps SSH and file ownership predictable.
    ports:
      # The local backend has no authentication layer, so keep it on localhost
      # unless the caller explicitly opts into broader network exposure.
      - "${TRACK_WEB_BIND_HOST:-127.0.0.1}:${TRACK_WEB_PORT:-3210}:3210"
    environment:
      PORT: "3210"
      TRACK_STATE_DIR: /home/track/backend-state
      TRACK_LEGACY_ROOT: /home/track/legacy-home/.track
      TRACK_LEGACY_CONFIG_PATH: /home/track/legacy-home/.config/track/config.json
    volumes:
      - type: bind
        source: ${HOME}/.track/backend
        target: /home/track/backend-state
        bind:
          create_host_path: true
      - type: bind
        source: ${HOME}
        target: /home/track/legacy-home
        read_only: true
